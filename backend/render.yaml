services:
  - type: web
    name: gradient-api
    runtime: python
    repo: https://github.com/jynlee7/gradient-fashion
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8000
